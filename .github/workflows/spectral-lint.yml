name: Spectral OpenAPI Linting

on:
  pull_request:
    paths:
      - '**.yml'
      - '**.yaml'
      - '**.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  spectral-lint:
    name: Run Spectral on OpenAPI Specs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Find OpenAPI files
        id: find-files
        run: |
          # Define exclusion patterns
          EXCLUDE_PATHS="-path */node_modules/* -o -path */.git/* -o -path */.spectral.yml -o -path */.github/*"
          
          # Find all YAML and JSON files
          files=$(find . -type f \( -name "*.yml" -o -name "*.yaml" -o -name "*.json" \) ! \( $EXCLUDE_PATHS \) ! -name "package*.json")
          
          # Create a temporary file to store OpenAPI file paths
          openapi_files_list=$(mktemp)
          
          # Filter for actual OpenAPI specs and store in temporary file
          for file in $files; do
            # Check if file contains openapi field at root level
            if [[ "$file" == *.json ]]; then
              # For JSON files, use jq if available, otherwise fall back to grep
              if command -v jq &> /dev/null; then
                if jq -e '.openapi' "$file" &> /dev/null; then
                  echo "$file" >> "$openapi_files_list"
                fi
              else
                if grep -q '"openapi"' "$file" 2>/dev/null; then
                  echo "$file" >> "$openapi_files_list"
                fi
              fi
            else
              # For YAML files, check for openapi field
              if grep -q '^openapi:' "$file" 2>/dev/null; then
                echo "$file" >> "$openapi_files_list"
              fi
            fi
          done
          
          # Check if any OpenAPI files were found
          if [ ! -s "$openapi_files_list" ]; then
            echo "No OpenAPI specification files found in this PR"
            echo "has_files=false" >> $GITHUB_OUTPUT
            rm -f "$openapi_files_list"
          else
            echo "Found OpenAPI files:"
            cat "$openapi_files_list"
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "files_list=$openapi_files_list" >> $GITHUB_OUTPUT
          fi
          
      - name: Setup Node.js
        if: steps.find-files.outputs.has_files == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Spectral
        if: steps.find-files.outputs.has_files == 'true'
        run: npm install -g @stoplight/spectral-cli
          
      - name: Run Spectral linting
        if: steps.find-files.outputs.has_files == 'true'
        id: spectral
        continue-on-error: true
        run: |
          # Create output file
          output_file="spectral-results.txt"
          echo "# Spectral OpenAPI Linting Results" > $output_file
          echo "" >> $output_file
          
          # Get the temporary file path with OpenAPI files
          files_list="${{ steps.find-files.outputs.files_list }}"
          
          # Run Spectral on each file by reading from the temporary file
          has_errors=false
          while IFS= read -r file; do
            echo "## File: \`$file\`" >> $output_file
            echo "" >> $output_file
            
            if spectral lint "$file" --format pretty >> $output_file 2>&1; then
              echo "✅ No issues found" >> $output_file
            else
              has_errors=true
              echo "" >> $output_file
            fi
            
            echo "" >> $output_file
            echo "---" >> $output_file
            echo "" >> $output_file
          done < "$files_list"
          
          # Clean up the temporary file
          rm -f "$files_list"
          
          # Save results
          if [ "$has_errors" = true ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
          else
            echo "status=passed" >> $GITHUB_OUTPUT
          fi
          
          # Save output for PR comment
          {
            echo 'results<<SPECTRAL_EOF'
            cat $output_file
            echo SPECTRAL_EOF
          } >> $GITHUB_OUTPUT
          
      - name: Upload Spectral results as artifact
        if: steps.find-files.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: spectral-linting-results
          path: spectral-results.txt
          retention-days: 30
          
      - name: Comment PR with results
        if: steps.find-files.outputs.has_files == 'true'
        uses: actions/github-script@v7
        env:
          SPECTRAL_RESULTS: ${{ steps.spectral.outputs.results }}
          SPECTRAL_STATUS: ${{ steps.spectral.outputs.status }}
        with:
          script: |
            const results = process.env.SPECTRAL_RESULTS;
            const status = process.env.SPECTRAL_STATUS;
            const workflowUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            
            const statusEmoji = status === 'passed' ? '✅' : '❌';
            const statusText = status === 'passed' ? 'PASSED' : 'FAILED';
            
            // Handle large results to prevent "Argument list too long" error
            const MAX_COMMENT_SIZE = 60000;
            let displayResults = results;
            
            if (results.length > MAX_COMMENT_SIZE) {
              const lines = results.split('\n');
              const issueLines = lines.filter(line => 
                line.includes('error') || 
                line.includes('warning') || 
                line.includes('info') ||
                line.includes('✅ No issues found') ||
                line.includes('## File:')
              );
              
              if (issueLines.length > 0) {
                displayResults = issueLines.slice(0, 100).join('\n');
                if (issueLines.length > 100) {
                  displayResults += `\n\n... and ${issueLines.length - 100} more issues. See workflow artifacts for complete details.`;
                }
              } else {
                displayResults = results.substring(0, MAX_COMMENT_SIZE - 200) + '\n\n... (truncated - see workflow artifacts for complete output)';
              }
            }
            
            const comment = `${statusEmoji} **Spectral Linting ${statusText}**\n\n\`\`\`\n${displayResults}\n\`\`\`\n\n🔗 **[View full detailed results in workflow artifacts](${workflowUrl})**`;
            
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Spectral')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
            
      - name: Fail if linting failed
        if: steps.spectral.outputs.status == 'failed'
        run: |
          echo "Spectral linting found issues. Please fix them before merging."
          exit 1
          
      - name: No OpenAPI files found
        if: steps.find-files.outputs.has_files == 'false'
        run: |
          echo "No OpenAPI specification files found in this PR. Skipping Spectral linting."
